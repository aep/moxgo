models:
  yolo11n:
    path: models/yolo11n.onnx
    inputs:
      images:
        type: image
        width: 640
        height: 640
    outputs:
      output0:
        labels: coco80

  birdnet:
    path: models/birdnet-v3-fp32.onnx
    inputs:
      input:
        type: audio
        sample_rate: 32000
        chunk: 5.0
        overlap: 0.0
    outputs:
      predictions:
        labels: models/birdnet-v3-labels.csv
        sigmoid: 1.0
