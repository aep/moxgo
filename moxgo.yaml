models:
  yolo11n:
    path: models/yolo11n.onnx
    inputs:
      images:
        type: image
        width: 640
        height: 640
    outputs:
      output0:
        type: detection
        labels: coco80

  rf-detr-large:
    path: models/rf-detr-large.onnx
    inputs:
      pixel_values:
        type: image
        width: 704
        height: 704
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    outputs:
      logits:
        type: detection
        boxes: pred_boxes
        labels: coco91

  birdnet:
    path: models/birdnet-v3-fp32.onnx
    inputs:
      input:
        type: audio
        sample_rate: 32000
        chunk: 5.0
        overlap: 0.0
    outputs:
      predictions:
        type: classification
        labels: models/birdnet-v3-labels.csv
        sigmoid: 1.0
